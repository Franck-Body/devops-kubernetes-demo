name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint Python code
        run: flake8 .

      - name: Build Docker image
        run: docker build -t devops-app .

      - name: Start Docker container
        run: docker run -d -p 8000:8000 --name devops-test devops-app

      - name: Check container status
        run: docker ps -a

      - name: Check container logs
        run: |
          sleep 2
          docker logs devops-test

      - name: Test application response
        run: |
          curl --retry 5 --retry-all-errors --retry-delay 1 localhost:8000 | grep "Hello DevOps"

      - name: Stop Docker container
        if: always()
        run: docker rm -f devops-test
